$kind: http-request
name: Actualizar Mínimo Producto
method: PATCH
url: '{{base_url}}/inventarios/productos/minimo'
order: 5000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "id_sucursal": {{id_sucursal}},
      "id_producto": {{id_producto}},
      "stock_minimo": 5
    }
