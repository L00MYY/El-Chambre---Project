$kind: http-request
name: Ajustar Stock Materia Prima
method: PATCH
url: '{{base_url}}/inventarios/materias-primas/stock'
order: 4000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "id_sucursal": {{id_sucursal}},
      "id_materia": {{id_materia}},
      "tipo": "entrada",
      "cantidad": 10
    }
