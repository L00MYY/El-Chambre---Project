$kind: http-request
name: Ajustar Stock Producto
method: PATCH
url: '{{base_url}}/inventarios/productos/stock'
order: 3000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "id_sucursal": {{id_sucursal}},
      "id_producto": {{id_producto}},
      "tipo": "entrada",
      "cantidad": 5
    }
