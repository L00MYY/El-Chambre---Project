$kind: http-request
name: Guardar Receta
method: PUT
url: '{{base_url}}/productos/{{id_producto}}/receta'
order: 1000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "ingredientes": [
        {"id_materia": {{id_materia}}, "cantidad_usada": 0.2}
      ]
    }
